<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iago Rivadulla - Data Scientist</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-gradient: radial-gradient(178.13% 82.27% at 50% 0%, #918c67 0%, #0E1216 100%);
            --card-bg: rgba(255, 255, 255, 0.07);
            --text-main: #ffffff;
            --text-dim: #bbbbbb;
            --icon-size: 19px;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: var(--bg-gradient);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: var(--text-main);
            -webkit-font-smoothing: antialiased;
        }

        .container {
            width: 320px;
            text-align: center;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
            padding: 25px 22px;
            padding-bottom: 15px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            margin-bottom: 10px;
            min-height: 636px; /* reemplaza con el valor real de index */
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: space-between
        }

        .card-top {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

    .card-bottom {
        display: flex;
        flex-direction: column;
        gap: 10px;
            }

        .profile-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 1.5px solid rgba(255, 255, 255, 0.6);
            object-fit: cover;
            margin-bottom: 15px;
            margin-top: 0px;
        }

        h1 {
            font-size: 22px;
            margin: 10px 0 4px 0;
            font-weight: 700;
        }

        .title {
            font-size: 13px;
            color: var(--text-dim);
            margin-bottom: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.2px;
        }
        
        .subtitle {
            font-size: 12px;
            color: #aaaaaa;
            margin-bottom: 28px;
        }

        .subtitle2 {
            font-size: 10px;
            color: #888888;
            margin-bottom: 28px;
            font-weight: 500;
        }

        .social-icons {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-top: 35px;
            margin-bottom: 0px;
        }

        .icon-circle {
            background: white;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.2s ease;
        }

        .icon-circle:hover { transform: scale(1.1); }

        /* Logos sociales en gris/negro para no romper la estética */
        .icon-circle img { 
            width: 18px; 
            height: 18px; 
            filter: grayscale(1); 
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .link-item {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 14px;
            padding: 12px 18px;
            text-decoration: none;
            color: white;
            font-size: 14px;
            transition: all 0.2s ease;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        /* Alineación estable: la clave de la profesionalidad */
        .link-item i {
            margin-right: 14px;
            color: #ffffff;
            opacity: 0.8;
            width: 22px; /* Ancho fijo para que el texto siempre alinee igual */
            display: flex;
            justify-content: center;
        }

        .link-item:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: scale(1.02);
        }

        .btn-save {
            background-color: white;
            color: black;
            border-radius: 50px;
            padding: 16px 0;
            font-weight: 700;
            width: 100%;
            font-size: 15px;
            transition: all 0.3s ease;
            text-decoration: none;
            display: block;
            text-align: center;
            box-sizing: border-box;
        }

        .btn-save:hover {
            background-color: #f0f0f0;
            transform: translateY(-2px);
        }

    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <div class="card-top">
        <img src="Profile_pic.png" alt="Iago Rivadulla" class="profile-img">
        <h1>Iago Rivadulla</h1>
        <div class="subtitle">Soluciones reales a problemas reales.</div>
    </div>

     <div class="card-bottom">
        <div class="links-container">
            <a href="http://" target="_blank" class="link-item">
                <i data-lucide="chart-no-axes-combined" stroke-width="1.5"></i> Market Regimen Terminal
            </a>
            <a href="http://" target="_blank" class="link-item">
                <i data-lucide="house" stroke-width="1.5"></i> Home Credit Default Risk
            </a>
            
        </div>
                        <div class="social-icons">
            <a href="index.html" class="icon-circle">
                <i data-lucide="undo-2" stroke-width="1.5"></i>
                <p>por que no va esto</p>
            </a>
        </div>
    </div>
    </div>

    <a href="iagorivadulla.vcf" class="btn-save">Guardar contacto</a>
</div>

<script>
    lucide.createIcons();
</script>

</body>
</html>
