<!DOCTYPE html>

<head>

    <title>Iago Rivadulla - Data Scientist</title>
    <style>
        :root {
            --bg-gradient: radial-gradient(178.13% 82.27% at 50% 0%, #918c67 0%, #0E1216 100%);
            --card-bg: rgba(255, 255, 255, 0.1);
            --accent-color: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: var(--bg-gradient);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: white;
        }

        .container {
            width: 315px;
            text-align: center;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 30px;
            padding: 30px 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            margin-bottom: 20px;
        }

        .profile-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 2px solid white;
            object-fit: cover;
            margin-bottom: 15px;
        }

        h1 {
            font-size: 22px;
            margin: 10px 0;
            font-weight: 800;
        }

        .title {
            font-size: 14px;
            color: #ccc;
            margin-bottom: 5px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .subtitle{
            font-size: 12px;
            color: #ccc;
            margin-bottom: 5px;
            font-weight: 600;
            letter-spacing: 1px;
        }
       .subtitle2{
            font-size: 10px;
            text-align: centre;
            color: #ccc;
            margin-bottom: 15px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 20px;
        }

        .link-item {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 14px;
            padding: 10px 15px;
            text-decoration: none;
            color: white;
            font-size: 14px;
            transition: 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .link-item:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
        }

        .btn-save {
            background-color: white;
            color: black;
            border: none;
            border-radius: 50px;
            padding: 15px 0; /* 15px arriba/abajo, 0 a los lados porque ya tiene width 100% */
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
            transition: 0.3s;
            text-decoration: none;
            display: block; /* Cambiado de inline-block a block para control total del ancho */
            text-align: center; /* Asegura que el texto esté en el eje central */
            box-sizing: border-box; /* Crucial para que el padding no sume ancho extra al 100% */
        }

        .btn-save:hover {
            transform: scale(1.03);
            background-color: #f0f0f0;
        }

        .social-icons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .icon-circle {
            background: white;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: 0.3s;
        }

        .icon-circle:hover { transform: scale(1.1); }
        
        .icon-circle img { width: 20px; height: 20px; }

    </style>
</head>
<body>
