<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iago Rivadulla - Data Scientist</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-gradient: radial-gradient(178.13% 82.27% at 50% 0%, #918c67 0%, #0E1216 100%);
            --card-bg: rgba(255, 255, 255, 0.06);
            --text-main: #ffffff;
            --text-dim: #bbbbbb;
            --icon-stroke: 1.25px; /* Controla la finura del icono aquí */
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: var(--bg-gradient);
            /* Fuente del sistema: la más estable y legible que existe */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: var(--text-main);
            -webkit-font-smoothing: antialiased;
        }

        .container {
            width: 320px;
            text-align: center;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
            padding: 35px 25px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            margin-bottom: 20px;
        }

        .profile-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 1.5px solid rgba(255, 255, 255, 0.6);
            object-fit: cover;
            margin-bottom: 15px;
        }

        h1 {
            font-size: 22px;
            margin: 10px 0 4px 0;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .title {
            font-size: 13px;
            color: var(--text-dim);
            margin-bottom: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.2px;
        }
        
        .subtitle {
            font-size: 12px;
            color: #aaaaaa;
            margin-bottom: 6px;
            font-weight: 400;
        }

        .subtitle2 {
            font-size: 10px;
            color: #888888;
            margin-bottom: 25px;
            font-weight: 500;
            letter-spacing: 0.3px;
        }

        .social-icons {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-bottom: 28px;
        }

        .icon-circle {
            background: white;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.2s ease;
        }

        .icon-circle:hover { transform: scale(1.1); }

        /* Unificamos logos sociales a gris oscuro/negro */
        .icon-circle img { 
            width: 18px; 
            height: 18px; 
            filter: grayscale(1) contrast(1.2); 
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .link-item {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 14px;
            padding: 12px 16px;
            text-decoration: none;
            color: white;
            font-size: 14px;
            transition: all 0.2s ease;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Estabilidad de los iconos internos */
        .link-item i {
            margin-right: 14px;
            color: #ffffff;
            opacity: 0.8;
            width: 20px; /* Ancho fijo para que el texto siempre alinee igual */
            display: flex;
            justify-content: center;
        }

        .link-item:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateX(2px);
        }

        .btn-save {
            background-color: white;
            color: black;
            border-radius: 50px;
            padding: 16px 0;
            font-weight: 700;
            width: 100%;
            font-size: 15px;
            transition: all 0.3s ease;
            text-decoration: none;
            display: block;
            text-align: center;
            box-sizing: border-box;
        }

        .btn-save:hover {
            background-color: #f0f0f0;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <img src="https://assets.azzapp.com/azzapp/image/upload/c_limit,w_224/f_avif/q_auto:best/i_prh3mob5ano2" alt="Iago Rivadulla" class="profile-img">

        <h1>Iago Rivadulla</h1>
        <div class="title">Data Scientist</div>
        <div class="subtitle">Datos bien cocinados, mejores decisiones</div>
        <div class="subtitle2">Python · SQL · Machine Learning · Quant Finance</div>

        <div class="social-icons">
            <a href="https://github.com/iagorivadulla" class="icon-circle">
                <img src="https://cdn-icons-png.flaticon.com/512/25/25231.png" alt="Github">
            </a>
            <a href="https://linkedin.com/in/iagorivadulla/" class="icon-circle">
                <img src="https://cdn-icons-png.flaticon.com/512/174/174857.png" alt="Linkedin">
            </a>
        </div>

        <div class="links-container">
            <a href="tel:+34699451475" class="link-item">
                <i data-lucide="phone" stroke-width="1.25"></i> +34 699 45 14 75
            </a>
            <a href="mailto:iagorivadullaact@gmail.com" class="link-item">
                <i data-lucide="mail" stroke-width="1.25"></i> iagorivadullaact@gmail.com
            </a>
            <a href="https://drive.google.com/file/d/1cSyBCLbb1VMz36oEY2XckIF4xznEmhS2/view" class="link-item">
                <i data-lucide="file-text" stroke-width="1.25"></i> Ver Currículum
            </a>
            <a href="proyectos.html" class="link-item">
                <i data-lucide="layout-dashboard" stroke-width="1.25"></i> Probar Proyectos
            </a>
        </div>
    </div>

    <a href="iagorivadulla.vcf" class="btn-save">Guardar contacto</a>
</div>

<script>
    // Inicializa los iconos con el grosor fino definido
    lucide.createIcons();
</script>

</body>
</html>
